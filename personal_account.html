<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketMaster — Главная</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <input class="theme-radio visually-hidden" type="radio" name="theme" id="t-light" value="light" checked>
    <input class="theme-radio visually-hidden" type="radio" name="theme" id="t-dark" value="dark">
    <div class="page">
        <aside class="sidebar">
            <button class="burger" type="button" aria-label="Открыть меню" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="brand">
                <img class="brand__logo" src="../media/logo.png" alt="TicketMaster">
                <div class="brand__name">TicketMaster</div>
            </div>

            <nav class="menu" aria-label="Основная навигация">
                <a class="menu__link" href="index.html">Главная</a>
                <a class="menu__link" href="my_tickets.html">Мои тикеты</a>
                <a class="menu__link" href="create_ticket.html">Создать тикет</a>
                <a class="menu__link" href="suggested_tickets.html">Предложенные<br>тикеты</a>
                <a class="menu__link" href="assigned_tickets.html">Назначенные<br>тикеты</a>
            </nav>

            <div class="profile">
                <a href="personal_account.html"><div class="profile__name">Новожилов Максим</div></a>
                <div class="profile__role">Сотрудник</div>
                <a class="logout" href="auth.html">Выйти из аккаунта</a>
            </div>
        </aside>

        <main class="content">
            <div class="theme-switcher" role="group" aria-label="Переключение темы">
                <label class="theme-switcher__option theme-switcher__option--light" for="t-light">Светлая</label>
                <label class="theme-switcher__option theme-switcher__option--dark" for="t-dark">Тёмная</label>
            </div>

            <section class="profile__page">
                <div class="profile__container">
                    <h2 id="profile__title">Личный кабинет</h2>
                    
                    <div class="profile__container__text">
                        <div>
                            <p class="profile__name profile__text--big">Имя</p>
                            <p class="profile__name profile__text--little">Максим</p>
                        </div>

                        <div>
                            <p class="profile__surname profile__text--big">Фамилия</p>
                            <p class="profile__surname profile__text--little">Новожилов</p>
                        </div>

                        <div>
                            <p class="profile__podrazdel profile__text--big">Подразделение</p>
                            <p class="profile__podrazdel profile__text--little">Бухгалтерия</p>
                        </div>

                        <div>
                            <p class="profile__category">Ответственный за категории</p>
                            <ul class="profile__text--little">
                                <li profile__text--little>Доступы</li>
                                <li>Программное обеспечение</li>
                                <li>Сетевые сервисы</li>
                            </ul>
                        </div>
                    </div>
                </div>
                

            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
