<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketMaster — Создание тикета</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <input class="theme-radio visually-hidden" type="radio" name="theme" id="t-light" value="light" checked>
    <input class="theme-radio visually-hidden" type="radio" name="theme" id="t-dark" value="dark">
    <div class="page">
        <aside class="sidebar">
            <button class="burger" type="button" aria-label="Открыть меню" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="brand">
                <img class="brand__logo" src="../media/logo.png" alt="TicketMaster">
                <div class="brand__name">TicketMaster</div>
            </div>

            <nav class="menu" aria-label="Основная навигация">
                <a class="menu__link" href="index.html">Главная</a>
                <a class="menu__link" href="my_tickets.html">Мои тикеты</a>
                <a class="menu__link menu__link--active" href="create_ticket.html">Создать тикет</a>
                <a class="menu__link" href="suggested_tickets.html">Предложенные<br>тикеты</a>
                <a class="menu__link" href="assigned_tickets.html">Назначенные<br>тикеты</a>
            </nav>

            <div class="profile">
                <a href="personal_account.html"><div class="profile__name">Новожилов Максим</div></a>
                <div class="profile__role">Сотрудник</div>
                <a class="logout" href="auth.html">Выйти из аккаунта</a>
            </div>
        </aside>

        <main class="content content--create">
            <div class="theme-switcher" role="group" aria-label="Переключение темы">
                <label class="theme-switcher__option theme-switcher__option--light" for="t-light">Светлая</label>
                <label class="theme-switcher__option theme-switcher__option--dark" for="t-dark">Тёмная</label>
            </div>

            <section class="create-ticket">
                <h1 id="create-ticket-title">Создание тикета</h1>

                <form class="ticket-form" action="my_tickets.html" method="get">
                    <label class="field field--full">
                        <span>Тема</span>
                        <input type="text" name="subject" placeholder="Кратко опишите суть обращения" required>
                    </label>

                    <label class="field field--full">
                        <span>Описание</span>
                        <textarea name="description" placeholder="Подробнее опишите проблему или запрос..." required></textarea>
                    </label>

                    <div class="field-row">
                        <label class="field">
                            <span>Категория</span>
                            <select name="category" required>
                                <option value="" selected disabled>Выберите категорию</option>
                                <option>Доступы</option>
                                <option>Сетевые сервисы</option>
                                <option>Оборудование</option>
                                <option>Программное обеспечение</option>
                            </select>
                        </label>

                        <label class="field">
                            <span>Подразделение</span>
                            <select name="department" required>
                                <option value="" selected disabled>Выберите подразделение</option>
                                <option>Бухгалтерия</option>
                                <option>Отдел продаж</option>
                                <option>Отдел кадров</option>
                                <option>IT-отдел</option>
                            </select>
                        </label>
                    </div>

                    <button class="primary-button" type="submit">Создать тикет</button>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
